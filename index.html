<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CL26051515_FIT</title>
<style>
  :root {
    --nero: #000000;
    --giallo: #ccff00;
    --verde: #00ff66;
    --rosso: #ff2222;
    --grigio2: #1a1a1a;
    --testo: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--nero); color: var(--testo); font-family: 'Arial Black', Arial, sans-serif; min-height: 100vh; }

  .schermata { display: none; flex-direction: column; min-height: 100vh; padding: 7px; }
  .schermata.attiva { display: flex; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--grigio2); border: 1px solid #333; border-radius: 6px;
    padding: 5px 9px; margin-bottom: 7px;
  }
  .h-programma { color: var(--giallo); font-size: 0.68rem; font-weight: 900; flex: 1; text-align: left; }
  .h-sessione  { color: #fff;          font-size: 0.68rem; font-weight: 900; flex: 1; text-align: center; }
  .h-versione  { color: #555;          font-size: 0.58rem; font-weight: 700; flex: 1; text-align: right; }

  /* PULSANTI */
  .btn {
    display: block; width: 100%; padding: 13px 6px;
    background: var(--giallo); color: var(--nero);
    border: none; border-radius: 8px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.82rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 0.06em; cursor: pointer;
    transition: transform 0.07s ease, box-shadow 0.07s ease;
    margin-bottom: 7px; -webkit-user-select: none; user-select: none;
    box-shadow: 0 4px 0 #7a9900;
  }
  .btn:active   { transform: translateY(3px); box-shadow: 0 1px 0 #7a9900; }
  .btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; transform: none; box-shadow: none; animation: none !important; }
  .btn.sm       { padding: 11px 4px; font-size: 0.72rem; line-height: 1.2; }
  .btn.verde    { background: var(--verde); box-shadow: 0 4px 0 #008833; }
  .btn.verde:active  { box-shadow: 0 1px 0 #008833; }
  .btn.grigio   { background: #2a2a2a; color: #777; box-shadow: 0 4px 0 #111; }
  .btn.grigio:active { box-shadow: 0 1px 0 #111; }

  @keyframes btnLamp { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
  .btn.lamp        { animation: btnLamp 0.7s infinite; background: var(--giallo); color: var(--nero); box-shadow: 0 4px 0 #7a9900; }
  .btn.lamp:active { animation: none; transform: translateY(3px); box-shadow: 0 1px 0 #7a9900; }

  @keyframes btnLampVerde { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
  .btn.lamp-verde        { animation: btnLampVerde 0.7s infinite; background: var(--verde); color: var(--nero); box-shadow: 0 4px 0 #008833; }
  .btn.lamp-verde:active { animation: none; transform: translateY(3px); box-shadow: 0 1px 0 #008833; }

  .btn-nav {
    display: block; width: 100%;
    background: var(--giallo); color: var(--nero);
    border: none; border-radius: 8px;
    font-size: 1.6rem; font-weight: 900; line-height: 1;
    padding: 8px 2px; cursor: pointer;
    transition: transform 0.07s ease, box-shadow 0.07s ease;
    -webkit-user-select: none; user-select: none;
    box-shadow: 0 4px 0 #7a9900;
  }
  .btn-nav:active   { transform: translateY(3px); box-shadow: 0 1px 0 #7a9900; }
  .btn-nav:disabled { background: #2a2a2a; color: #333; cursor: not-allowed; transform: none; box-shadow: none; animation: none !important; }
  @keyframes navLamp { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
  .btn-nav.lamp        { animation: navLamp 0.7s infinite; }
  .btn-nav.lamp:active { animation: none; transform: translateY(3px); box-shadow: 0 1px 0 #7a9900; }

  /* S1 */
  .sez-label { font-size: 0.65rem; font-weight: 900; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; margin-top: 12px; }
  .info-box  { background: var(--grigio2); border: 1px solid #333; border-radius: 7px; padding: 11px; margin-bottom: 7px; font-size: 0.78rem; color: #888; line-height: 1.5; }
  .lista-sessioni { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .btn-sess {
    padding: 13px 12px; background: var(--grigio2); border: 2px solid #333; border-radius: 8px;
    color: #ccc; font-family: 'Arial Black', Arial, sans-serif; font-size: 0.85rem;
    font-weight: 900; text-transform: uppercase; cursor: pointer;
    transition: transform 0.07s; text-align: left; letter-spacing: 0.04em;
  }
  .btn-sess:active { transform: scale(0.97); }
  .btn-sess.sel    { border-color: var(--giallo); color: var(--giallo); }

  /* S2 */
  #s2 { padding: 6px; }
  .riga-id { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; gap: 5px; }
  .id-badge {
    font-size: 1rem; font-weight: 900; padding: 5px 10px; border-radius: 6px;
    letter-spacing: 0.04em; min-width: 82px; text-align: center; border: 2px solid transparent;
  }
  .id-rosso  { background: var(--rosso);  color: #fff; }
  .id-verde  { background: var(--verde);  color: #000; }
  .id-giallo { background: var(--giallo); color: #000; }   /* MOD 4 precedente: fisso, no lamp */

  .pos-txt   { font-size: 0.9rem; font-weight: 900; color: var(--giallo); white-space: nowrap; }
  .serie-txt { font-size: 1rem;   font-weight: 900; color: var(--giallo); white-space: nowrap; }

  .desc-box { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 9px; margin-bottom: 5px; }
  .desc-b   { font-size: 0.72rem; color: var(--giallo); line-height: 1.45; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .desc-d   { font-size: 0.72rem; color: #ffffff;       line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }

  .pgrid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
  .pitem  { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 4px 5px; display: flex; flex-direction: column; align-items: center; }
  .plabel { font-size: 0.50rem; color: var(--giallo); font-weight: 900; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; white-space: nowrap; }
  .pinput {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid #444;
    color: var(--giallo); font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.88rem; font-weight: 900; text-align: center; padding: 2px 0; outline: none;
  }
  .pinput:disabled { color: #333; border-bottom-color: #222; }
  /* MOD 8: input KG usa testo libero per supportare virgola */
  .pinput-kg {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid #444;
    color: var(--giallo); font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.88rem; font-weight: 900; text-align: center; padding: 2px 0; outline: none;
    -moz-appearance: textfield;
  }
  .pinput-kg:disabled { color: #333; border-bottom-color: #222; }

  .pesi-row { display: flex; align-items: center; gap: 3px; width: 100%; }
  .pesi-row .pinput:first-child { width: 26px; flex-shrink: 0; }
  .pesi-x   { color: var(--giallo); font-size: 0.75rem; flex-shrink: 0; font-weight: 900; }
  .pesi-row .pinput-kg { flex: 1; }

  .dur-row  { display: flex; align-items: center; gap: 4px; width: 100%; justify-content: center; }
  .dur-row .pinput { width: 38px; }
  .dur-sep  { color: var(--giallo); font-size: 0.9rem; font-weight: 900; }

  /* Countdown */
  .cd-box  {
    background: var(--grigio2); border: 2px solid #2a2a2a; border-radius: 8px;
    padding: 7px 10px; text-align: center; margin-bottom: 5px; min-height: 50px;
    display: flex; align-items: center; justify-content: center;
  }
  .cd-num  { font-size: 2.1rem; font-weight: 900; color: var(--giallo); letter-spacing: 0.05em; }
  /* MOD 7: cd-tipo su due righe */
  .cd-tipo { font-size: 0.58rem; color: var(--giallo); font-weight: 900; text-transform: uppercase;
             letter-spacing: 0.06em; margin-left: 7px; line-height: 1.3; text-align: left; }

  .nav3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
  .tim3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }

  .stor-box  { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 8px; flex: 1; overflow-y: auto; min-height: 70px; max-height: 150px; }
  .stor-riga { font-size: 0.7rem; font-weight: 700; padding: 4px 0; border-bottom: 1px solid #222; display: flex; gap: 14px; align-items: center; }
  .stor-data { color: #ffffff; font-size: 0.62rem; min-width: 54px; }
  .stor-s    { color: var(--verde); }
  .stor-p    { color: var(--giallo); }
  .stor-t    { color: #ff9900; }
  .stor-empty{ color: #333; font-size: 0.68rem; font-style: italic; }

  .flash { position: fixed; inset: 0; background: var(--giallo); opacity: 0; pointer-events: none; z-index: 9999; transition: opacity 0.08s; }
  .flash.on { opacity: 0.9; }

  #s3 { justify-content: center; align-items: center; text-align: center; gap: 18px; }
  .fine-t { font-size: 1.7rem; font-weight: 900; color: var(--verde); letter-spacing: 0.1em; line-height: 1.3; }
  .fine-s { font-size: 1.1rem; font-weight: 900; color: #666; letter-spacing: 0.15em; }
  .fine-i { font-size: 0.72rem; color: #444; line-height: 1.6; white-space: pre-line; }
</style>
</head>
<body>
<div class="flash" id="fl"></div>

<!-- S1 -->
<div class="schermata attiva" id="s1">
  <div class="header">
    <span class="h-programma" id="h1p">FIT TRAINER</span>
    <span class="h-sessione"  id="h1s"></span>
    <span class="h-versione">CL26051515_FIT</span>
  </div>
  <div class="sez-label">Programma</div>
  <div class="info-box" id="info-prog">Nessun programma caricato</div>
  <button class="btn" onclick="document.getElementById('finput').click()">CARICA PROGRAMMA JSON</button>
  <input type="file" id="finput" accept=".json" style="display:none" onchange="leggiJSON(event)">
  <div class="sez-label">Sessione</div>
  <div class="lista-sessioni" id="lista-sess"></div>
  <button class="btn verde" id="btn-avvia" disabled onclick="avviaSessione()">AVVIA SESSIONE</button>
</div>

<!-- S2 -->
<div class="schermata" id="s2">
  <div class="header">
    <span class="h-programma" id="h2p">—</span>
    <span class="h-sessione"  id="h2s">—</span>
    <span class="h-versione">CL26051515_FIT</span>
  </div>
  <div class="riga-id">
    <div class="id-badge id-verde" id="id-badge">—</div>
    <div class="pos-txt"   id="pos-txt">0_0</div>
    <div class="serie-txt" id="serie-txt">SERIE: —</div>
  </div>
  <div class="desc-box">
    <div class="desc-b" id="desc-b">—</div>
    <div class="desc-d" id="desc-d">—</div>
  </div>

  <!-- MOD 1: label 0/1/2 x KG (con spazio); MOD 8: input serie intero 1-10, rip 1-50 -->
  <div class="pgrid3">
    <div class="pitem">
      <div class="plabel">SERIE</div>
      <input class="pinput" id="p-ser" type="number" min="1" max="10" step="1"
             inputmode="numeric" oninput="clampInt(this,1,10)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">RIPETIZIONI</div>
      <input class="pinput" id="p-rip" type="number" min="1" max="50" step="1"
             inputmode="numeric" oninput="clampInt(this,1,50)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">0/1/2 x KG</div><!-- MOD 1 -->
      <div class="pesi-row">
        <input class="pinput" id="p-pn" type="number" min="0" max="2" step="1"
               inputmode="numeric" oninput="clampInt(this,0,2)" onchange="saveP()">
        <span class="pesi-x">×</span>
        <!-- MOD 8: KG con virgola, tipo text -->
        <input class="pinput-kg" id="p-pk" type="text" inputmode="decimal"
               pattern="[0-9]*[,.]?[0-9]*" placeholder="0,0"
               oninput="cleanKg(this)" onchange="saveP()">
      </div>
    </div>
  </div>

  <!-- MOD 8: minuti 0-90, secondi 0-59 con input intero -->
  <div class="pgrid3">
    <div class="pitem">
      <div class="plabel">DURATA MIN:SEC</div>
      <div class="dur-row">
        <input class="pinput" id="p-dm" type="number" min="0" max="90" step="1"
               inputmode="numeric" oninput="clampInt(this,0,90)" onchange="saveP()">
        <span class="dur-sep">:</span>
        <input class="pinput" id="p-ds" type="number" min="0" max="59" step="1"
               inputmode="numeric" oninput="clampInt(this,0,59)" onchange="saveP()">
      </div>
    </div>
    <div class="pitem">
      <div class="plabel">RIPOSO SERIE MIN:SEC</div>
      <div class="dur-row">
        <input class="pinput" id="p-rs-m" type="number" min="0" max="90" step="1"
               inputmode="numeric" oninput="clampInt(this,0,90)" onchange="saveP()">
        <span class="dur-sep">:</span>
        <input class="pinput" id="p-rs-s" type="number" min="0" max="59" step="1"
               inputmode="numeric" oninput="clampInt(this,0,59)" onchange="saveP()">
      </div>
    </div>
    <div class="pitem">
      <div class="plabel">RIPOSO FINALE MIN:SEC</div>
      <div class="dur-row">
        <input class="pinput" id="p-rf-m" type="number" min="0" max="90" step="1"
               inputmode="numeric" oninput="clampInt(this,0,90)" onchange="saveP()">
        <span class="dur-sep">:</span>
        <input class="pinput" id="p-rf-s" type="number" min="0" max="59" step="1"
               inputmode="numeric" oninput="clampInt(this,0,59)" onchange="saveP()">
      </div>
    </div>
  </div>

  <!-- MOD 6: pulsanti timer con longpress 5s → salta a 5s finali -->
  <!-- MOD 7: RIPOSO / SERIE su due righe, RIPOSO / FINALE su due righe -->
  <div class="tim3">
    <button class="btn sm" id="btn-td"  disabled
            onpointerdown="lpStart('d')" onpointerup="lpEnd()" onpointerleave="lpEnd()">
      AVVIO<br>DURATA
    </button>
    <button class="btn sm" id="btn-trs" disabled
            onpointerdown="lpStart('rs')" onpointerup="lpEnd()" onpointerleave="lpEnd()">
      AVVIO RIPOSO<br>SERIE
    </button>
    <button class="btn sm" id="btn-trf" disabled
            onpointerdown="lpStart('rf')" onpointerup="lpEnd()" onpointerleave="lpEnd()">
      AVVIO RIPOSO<br>FINALE
    </button>
  </div>

  <div class="cd-box">
    <span class="cd-num"  id="cd-num"  style="display:none">0:00</span>
    <span class="cd-tipo" id="cd-tipo" style="display:none"></span>
  </div>

  <div class="nav3" style="margin-bottom:5px">
    <button class="btn-nav" id="btn-prec" onclick="goPrec()">&#x23EA;</button>
    <button class="btn sm"  id="btn-avs"  onclick="avviaScheda()" style="margin-bottom:0" disabled>AVVIO<br>SCHEDA</button>
    <button class="btn-nav" id="btn-succ" onclick="goSucc()">&#x23E9;</button>
  </div>

  <div class="stor-box">
    <div id="stor-list"><div class="stor-empty">Nessuna prestazione registrata</div></div>
  </div>
</div>

<!-- S3 — MOD 2: header con h-programma allineato a sinistra, sessione al centro, versione a destra -->
<div class="schermata" id="s3">
  <div class="header">
    <span class="h-programma" id="h3p">—</span>
    <span class="h-sessione"  id="h3s">—</span>
    <span class="h-versione">CL26051515_FIT</span>
  </div>
  <div class="fine-t">SESSIONE<br>COMPLETATA</div>
  <div class="fine-s" id="fine-av" style="display:none">ARRIVEDERCI!</div>
  <div class="fine-i" id="fine-i"></div>
  <button class="btn verde lamp-verde" id="btn-salva" onclick="salvaSessione()">SALVA SESSIONE</button>
  <button class="btn grigio" style="margin-top:6px" onclick="tornaInizio()">TORNA ALL'INIZIO</button>
  <button class="btn-nav"   style="margin-top:6px;box-shadow:0 4px 0 #7a9900" onclick="tornaUltimaScheda()">&#x23EA;</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// STATO GLOBALE
// ══════════════════════════════════════════════════════════════
let J        = null;
let SI       = -1;
let CI       = 0;
let PL       = [];
let ultComp  = -1;
let activeCI = -1;
// MOD 9: serR = numero serie in corso (va da ser fino a 1, mai sotto 1 durante esecuzione)
let serR     = 0;

let tInt        = null;
let tSec        = 0;
let timerInCorso= false;
let tTipo       = '';  // tipo del timer corrente

// Stati: 'idle' | 'attesa_durata' | 'attesa_rs' | 'attesa_rf' | 'completata'
let fase = 'idle';

// MOD 6: longpress
let lpTimer   = null;
let lpTipoAtt = '';   // tipo del pulsante su cui si sta premendo

// ══════════════════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════════════════
function modScheda(p) {
  return (p.dm > 0 || p.ds > 0) ? 'durata' : 'pesi';
}

function secRiposo(p, tipo) {
  if (tipo === 'rs') return (p.rs_m||0)*60 + (p.rs_s||0);
  if (tipo === 'rf') return (p.rf_m||0)*60 + (p.rf_s||0);
  return 0;
}

// MOD 8: legge valore kg con virgola o punto come separatore
function leggiKg(id) {
  const v = document.getElementById(id).value.replace(',', '.');
  const n = parseFloat(v);
  return isNaN(n) ? 0 : Math.min(999.9, Math.max(0, Math.round(n*10)/10));
}

// MOD 8: formatta KG con virgola per display italiano
function fmtKg(v) {
  return (Math.round(v*10)/10).toFixed(1).replace('.', ',');
}

// MOD 8: pulizia input KG — ammette solo cifre, virgola, punto
function cleanKg(el) {
  el.value = el.value.replace(/[^0-9,\.]/g, '');
  // non più di un separatore
  const parts = el.value.split(/[,\.]/);
  if (parts.length > 2) el.value = parts[0] + ',' + parts.slice(1).join('');
  // max 1 decimale
  if (parts.length === 2 && parts[1].length > 1) {
    el.value = parts[0] + ',' + parts[1].slice(0,1);
  }
  // limite massimo
  const n = parseFloat(el.value.replace(',','.'));
  if (!isNaN(n) && n > 999.9) el.value = '999,9';
}

// MOD 8: clamp intero
function clampInt(el, mn, mx) {
  let v = parseInt(el.value);
  if (isNaN(v)) return;
  if (v < mn) el.value = mn;
  if (v > mx) el.value = mx;
}

// ══════════════════════════════════════════════════════════════
// S1
// ══════════════════════════════════════════════════════════════
function leggiJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      J = JSON.parse(ev.target.result);
      document.getElementById('info-prog').textContent = J.programma;
      mostraSessioni();
    } catch(err) { alert('JSON non valido: ' + err.message); }
  };
  r.readAsText(f);
}

function mostraSessioni() {
  const el = document.getElementById('lista-sess');
  el.innerHTML = ''; SI = -1;
  document.getElementById('btn-avvia').disabled = true;
  J.sessioni.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'btn-sess';
    b.textContent = s.nome + '  (' + s.schede.length + ' schede)';
    b.onclick = () => {
      document.querySelectorAll('.btn-sess').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel'); SI = i;
      document.getElementById('btn-avvia').disabled = false;
    };
    el.appendChild(b);
  });
}

function avviaSessione() {
  if (SI < 0) return;
  const sess = J.sessioni[SI];
  PL = sess.schede.map(s => ({
    ser:  s.serie,
    rip:  s.ripetizioni,
    pn:   s.pesi_num,
    pk:   s.pesi_kg,
    dm:   s.durata_min,
    ds:   s.durata_sec,
    rs_m: s.riposo_serie_min  !== undefined ? s.riposo_serie_min  : (s.rs_m||0),
    rs_s: s.riposo_serie_sec  !== undefined ? s.riposo_serie_sec  : (s.rs_s||0),
    rf_m: s.riposo_finale_min !== undefined ? s.riposo_finale_min : (s.rf_m||0),
    rf_s: s.riposo_finale_sec !== undefined ? s.riposo_finale_sec : (s.rf_s||0)
  }));
  CI = 0; ultComp = -1; activeCI = -1; serR = 0; fase = 'idle';
  setH(J.programma, sess.nome);
  go('s2'); render();
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  const sess = J.sessioni[SI];
  const nT   = sess.schede.length;
  const sc   = sess.schede[CI];
  const lib  = J.libreria[sc.id];
  const p    = PL[CI];

  document.getElementById('pos-txt').textContent = (CI+1) + '_' + nT;

  // Badge colore
  const bd = document.getElementById('id-badge');
  bd.textContent = sc.id;
  if (CI === activeCI && fase !== 'completata') {
    bd.className = 'id-badge id-giallo';
  } else if (CI <= ultComp) {
    bd.className = 'id-badge id-rosso';
  } else {
    bd.className = 'id-badge id-verde';
  }

  document.getElementById('desc-b').textContent = lib ? lib.desc_breve       : '—';
  document.getElementById('desc-d').textContent = lib ? lib.desc_dettagliata : '—';

  // Parametri
  document.getElementById('p-ser').value  = p.ser;
  document.getElementById('p-rip').value  = p.rip;
  document.getElementById('p-pn').value   = p.pn;
  document.getElementById('p-pk').value   = fmtKg(p.pk);   // MOD 8: virgola
  document.getElementById('p-dm').value   = p.dm;
  document.getElementById('p-ds').value   = p.ds;
  document.getElementById('p-rs-m').value = p.rs_m;
  document.getElementById('p-rs-s').value = p.rs_s;
  document.getElementById('p-rf-m').value = p.rf_m;
  document.getElementById('p-rf-s').value = p.rf_s;

  const lockAll = CI <= ultComp;
  ['p-ser','p-rip','p-pn','p-pk','p-dm','p-ds','p-rs-m','p-rs-s','p-rf-m','p-rf-s']
    .forEach(id => document.getElementById(id).disabled = lockAll);

  // MOD 5: serie==1 blocca riposo serie; >1 lo riabilita
  if (!lockAll) {
    const ser1 = parseInt(p.ser) === 1;
    document.getElementById('p-rs-m').disabled = ser1;
    document.getElementById('p-rs-s').disabled = ser1;
  }

  // Contatore serie
  const stxt = document.getElementById('serie-txt');
  if (CI <= ultComp)        stxt.textContent = 'SERIE: \u2713';
  else if (CI === activeCI) stxt.textContent = 'SERIE: ' + serR;
  else                      stxt.textContent = 'SERIE: ' + p.ser;

  aggUI();
  renderStorico(sc.id);
}

// ══════════════════════════════════════════════════════════════
// aggUI — macchina a stati pulsanti
// MOD 3: se un AVVIO SCHEDA lampeggia, tutti gli altri sono disabilitati
// MOD 4 (precedente): AVVIO SCHEDA lampeggia solo sul turno
// ══════════════════════════════════════════════════════════════
function aggUI() {
  const sullaAttiva  = (CI === activeCI);
  const completataCI = (CI <= ultComp);
  const p     = activeCI >= 0 ? PL[activeCI] : PL[CI];
  const hasDur= (p.dm > 0 || p.ds > 0);
  const ser1  = parseInt(activeCI >= 0 ? PL[activeCI].ser : PL[CI].ser) === 1;

  // INDIETRO: sempre attivo, mai lampeggiante
  setBtnNav('btn-prec', true, false);

  // AVANTI: lampeggia se sulla scheda appena completata
  setBtnNav('btn-succ', true, fase === 'completata' && sullaAttiva);

  // AVVIO SCHEDA
  // MOD 3: se qualche scheda sta lampeggiando (turno = CI === ultComp+1 e activeCI===-1),
  // allora SOLO quella lampeggia, tutte le altre sono disabilitate
  if (activeCI !== -1 || completataCI) {
    setBtn('btn-avs', false, false);
  } else {
    // MOD 3: la scheda "di turno" è solo la prima verde disponibile
    const turno = (CI === ultComp + 1);
    // Se non è il turno E c'è una scheda di turno disponibile → disabilitato
    // Se non è il turno E non c'è ancora nessuna di turno → attivo (scheda 0 all'inizio)
    const ceTurnoAltrove = (ultComp + 1 < J.sessioni[SI].schede.length);
    if (!turno && ceTurnoAltrove) {
      setBtn('btn-avs', false, false);
    } else {
      setBtn('btn-avs', true, turno);
    }
  }

  // TIMER
  if (!sullaAttiva || fase === 'idle' || fase === 'completata' || timerInCorso) {
    setBtn('btn-td',  false, false);
    setBtn('btn-trs', false, false);
    setBtn('btn-trf', false, false);
    return;
  }

  if (hasDur) {
    setBtn('btn-td',  fase === 'attesa_durata', fase === 'attesa_durata');
    setBtn('btn-trs', ser1 ? false : fase === 'attesa_rs', ser1 ? false : fase === 'attesa_rs');
    setBtn('btn-trf', fase === 'attesa_rf',     fase === 'attesa_rf');
  } else {
    setBtn('btn-td',  false, false);
    setBtn('btn-trs', ser1 ? false : fase === 'attesa_rs', ser1 ? false : fase === 'attesa_rs');
    setBtn('btn-trf', fase === 'attesa_rf', fase === 'attesa_rf');
  }
}

function setBtn(id, attivo, lampeggia) {
  const el = document.getElementById(id);
  el.disabled = !attivo;
  el.classList.remove('lamp');
  if (attivo && lampeggia) el.classList.add('lamp');
}

function setBtnNav(id, attivo, lampeggia) {
  const el = document.getElementById(id);
  el.disabled = !attivo;
  el.classList.remove('lamp');
  if (attivo && lampeggia) el.classList.add('lamp');
}

// ══════════════════════════════════════════════════════════════
// MOD 6: LONGPRESS — tap >5s sul timer attivo → salta a 5s finali
// ══════════════════════════════════════════════════════════════
function lpStart(tipo) {
  // Avvia il timer se il pulsante è quello lampeggiante (cioè attivo e corretto)
  const btnId = tipo==='d' ? 'btn-td' : tipo==='rs' ? 'btn-trs' : 'btn-trf';
  const el = document.getElementById(btnId);
  if (el.disabled) return;

  if (!timerInCorso) {
    // Tap normale — avvia il timer subito
    startTimer(tipo);
    return;
  }
  // Timer già in corso: longpress per saltare a 5 secondi
  lpTipoAtt = tipo;
  lpTimer = setTimeout(() => {
    if (tInt && tSec > 5) {
      tSec = 5;
      cdShow(tSec, tTipo);
    }
    lpTimer = null;
  }, 5000);
}

function lpEnd() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
}

// ══════════════════════════════════════════════════════════════
// AVVIO SCHEDA
// ══════════════════════════════════════════════════════════════
function avviaScheda() {
  if (activeCI !== -1) return;
  if (CI <= ultComp)   return;

  activeCI = CI;
  // MOD 9: serR inizia dal numero di serie configurato (mai 0 durante esecuzione)
  serR = Math.max(1, parseInt(PL[CI].ser) || 1);
  document.getElementById('serie-txt').textContent = 'SERIE: ' + serR;
  document.getElementById('id-badge').className    = 'id-badge id-giallo';

  const p = PL[activeCI];
  if (modScheda(p) === 'durata') {
    fase = 'attesa_durata';
  } else {
    fase = (serR === 1) ? 'attesa_rf' : 'attesa_rs';
  }
  aggUI();
}

// ══════════════════════════════════════════════════════════════
// NAVIGAZIONE
// ══════════════════════════════════════════════════════════════
function goPrec() {
  if (CI === 0) { go('s1'); return; }
  CI--;
  render();
}

function goSucc() {
  const nT = J.sessioni[SI].schede.length;
  if (CI === activeCI && fase === 'completata') {
    activeCI = -1;
    fase     = 'idle';
  }
  if (CI >= nT - 1) { go('s3'); return; }
  CI++;
  render();
}

function tornaUltimaScheda() {
  CI = J.sessioni[SI].schede.length - 1;
  go('s2'); render();
}

// ══════════════════════════════════════════════════════════════
// PARAMETRI
// ══════════════════════════════════════════════════════════════
function saveP() {
  if (CI <= ultComp) return;
  const p = PL[CI];
  p.ser   = Math.max(1, parseInt(document.getElementById('p-ser').value)   || 1);
  p.rip   = Math.max(1, parseInt(document.getElementById('p-rip').value)   || 1);
  p.pn    = parseInt(document.getElementById('p-pn').value)    || 0;
  p.pk    = leggiKg('p-pk');
  p.dm    = parseInt(document.getElementById('p-dm').value)    || 0;
  p.ds    = parseInt(document.getElementById('p-ds').value)    || 0;
  p.rs_m  = parseInt(document.getElementById('p-rs-m').value)  || 0;
  p.rs_s  = parseInt(document.getElementById('p-rs-s').value)  || 0;
  p.rf_m  = parseInt(document.getElementById('p-rf-m').value)  || 0;
  p.rf_s  = parseInt(document.getElementById('p-rf-s').value)  || 0;

  if (CI !== activeCI) {
    document.getElementById('serie-txt').textContent = 'SERIE: ' + p.ser;
  }

  // MOD 5: sblocca/blocca riposo serie in base al valore corrente di serie
  const lockAll = CI <= ultComp;
  if (!lockAll) {
    const ser1 = p.ser === 1;
    document.getElementById('p-rs-m').disabled = ser1;
    document.getElementById('p-rs-s').disabled = ser1;
  }
  aggUI();
}

// ══════════════════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════════════════
function startTimer(tipo) {
  if (activeCI === -1) return;
  if (tInt) { clearInterval(tInt); tInt = null; }
  timerInCorso = true;
  tTipo = tipo;

  const p = PL[activeCI];
  let sec = 0;
  if (tipo === 'd')  sec = (p.dm||0)*60 + (p.ds||0);
  if (tipo === 'rs') sec = secRiposo(p, 'rs');
  if (tipo === 'rf') sec = secRiposo(p, 'rf');

  aggUI();

  if (sec <= 0) { timerInCorso = false; onEnd(tipo); return; }
  tSec = sec; cdShow(tSec, tipo);
  tInt = setInterval(() => {
    tSec--;
    if (tSec <= 0) { clearInterval(tInt); tInt = null; alert5(); onEnd(tipo); }
    else cdShow(tSec, tipo);
  }, 1000);
}

// ══════════════════════════════════════════════════════════════
// onEnd — MOD 9: serR scala ma non scende mai sotto 1 finché non si completa
// ══════════════════════════════════════════════════════════════
function onEnd(tipo) {
  timerInCorso = false;
  cdClear();

  const p   = PL[activeCI];
  const mod = modScheda(p);

  if (tipo === 'd') {
    // Fine durata: serR resta invariato finché non finisce il riposo
    if (serR <= 1) {
      fase = 'attesa_rf';
    } else {
      fase = 'attesa_rs';
    }

  } else if (tipo === 'rs') {
    // Fine riposo serie: ORA scala serR (la serie è conclusa)
    // MOD 9: serR non scende mai sotto 1 qui — scala solo se >1
    if (serR > 1) serR--;
    if (CI === activeCI) document.getElementById('serie-txt').textContent = 'SERIE: ' + serR;
    if (mod === 'durata') {
      fase = 'attesa_durata';
    } else {
      fase = (serR <= 1) ? 'attesa_rf' : 'attesa_rs';
    }

  } else if (tipo === 'rf') {
    // Fine riposo finale: scheda completata — serR non tocchiamo più
    completaScheda();
    return;
  }

  aggUI();
}

function completaScheda() {
  const idx = activeCI;
  const sc  = J.sessioni[SI].schede[idx];
  const p   = PL[idx];

  if (!J.storico[sc.id]) J.storico[sc.id] = [];
  const d  = new Date();
  const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  J.storico[sc.id].unshift({ data:ds, ser:p.ser, rip:p.rip, pn:p.pn, pk:p.pk, dm:p.dm, ds:p.ds });
  if (J.storico[sc.id].length > 10) J.storico[sc.id].length = 10;
  localStorage.setItem('fit_j', JSON.stringify(J));

  if (idx > ultComp) ultComp = idx;
  fase = 'completata';

  render();
  if (CI === idx) {
    document.getElementById('id-badge').className = 'id-badge id-rosso';
    setBtnNav('btn-succ', true, true);
    setBtn('btn-avs', false, false);
    setBtn('btn-td',  false, false);
    setBtn('btn-trs', false, false);
    setBtn('btn-trf', false, false);
  }
}

// MOD 7: etichetta timer su due righe dove serve
function cdShow(sec, tipo) {
  const m = Math.floor(sec/60), s = sec%60;
  let lbl;
  if (tipo === 'd')       lbl = 'DURATA';
  else if (tipo === 'rs') lbl = 'RIPOSO\nSERIE';
  else                    lbl = 'RIPOSO\nFINALE';
  document.getElementById('cd-num').style.display  = '';
  document.getElementById('cd-tipo').style.display = '';
  document.getElementById('cd-num').textContent    = m+':'+String(s).padStart(2,'0');
  // MOD 7: usa innerHTML con <br> per due righe
  document.getElementById('cd-tipo').innerHTML     = lbl.replace('\n','<br>');
}

function cdClear() {
  document.getElementById('cd-num').style.display  = 'none';
  document.getElementById('cd-tipo').style.display = 'none';
}

function alert5() {
  const fl = document.getElementById('fl');
  for (let i = 0; i < 5; i++) {
    const t = i * 340;
    setTimeout(() => { fl.classList.add('on'); setTimeout(() => fl.classList.remove('on'), 180); }, t);
  }
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    for (let i = 0; i < 5; i++) {
      const t = i * 0.34;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 900;
      g.gain.setValueAtTime(0.9, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.22);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.25);
    }
  } catch(e){}
  if (navigator.vibrate) navigator.vibrate([180,60,180,60,180,60,180,60,300]);
}

// ══════════════════════════════════════════════════════════════
// STORICO
// ══════════════════════════════════════════════════════════════
function renderStorico(id) {
  const righe = (J && J.storico && J.storico[id]) ? J.storico[id] : [];
  const el = document.getElementById('stor-list');
  if (!righe.length) { el.innerHTML = '<div class="stor-empty">Nessuna prestazione registrata</div>'; return; }
  el.innerHTML = righe.map(r => {
    let pt = [];
    if (r.ser>0||r.rip>0) pt.push('<span class="stor-s">'+r.ser+'x'+r.rip+'</span>');
    if (r.pn>0||r.pk>0)   pt.push('<span class="stor-p">'+r.pn+'x'+fmtKg(r.pk)+'kg</span>');
    if (r.dm>0||r.ds>0)   pt.push('<span class="stor-t">'+r.dm+'m:'+String(r.ds).padStart(2,'0')+'s</span>');
    return '<div class="stor-riga"><span class="stor-data">'+r.data+'</span>'+pt.join('')+'</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════════════
// S3
// ══════════════════════════════════════════════════════════════
function salvaSessione() {
  const sess = J.sessioni[SI];
  sess.schede.forEach((s,i) => {
    const p = PL[i];
    s.serie=p.ser; s.ripetizioni=p.rip; s.pesi_num=p.pn; s.pesi_kg=p.pk;
    s.durata_min=p.dm; s.durata_sec=p.ds;
    s.riposo_serie_min=p.rs_m; s.riposo_serie_sec=p.rs_s;
    s.riposo_finale_min=p.rf_m; s.riposo_finale_sec=p.rf_s;
  });
  localStorage.setItem('fit_j', JSON.stringify(J));
  const d  = new Date();
  const fn = J.programma+'_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.json';
  const blob = new Blob([JSON.stringify(J,null,2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href=url; a.download=fn; a.click();
  URL.revokeObjectURL(url);
  const bs = document.getElementById('btn-salva');
  bs.classList.remove('lamp-verde');
  bs.disabled   = true;
  bs.textContent= 'SALVATO';
  document.getElementById('fine-av').style.display = 'block';
  document.getElementById('fine-i').textContent    = 'File: ' + fn;
}

function tornaInizio() {
  if (tInt) { clearInterval(tInt); tInt = null; }
  lpEnd();
  J=null; SI=-1; CI=0; PL=[]; ultComp=-1; activeCI=-1; serR=0; fase='idle'; timerInCorso=false;
  document.getElementById('info-prog').textContent = 'Nessun programma caricato';
  document.getElementById('lista-sess').innerHTML  = '';
  document.getElementById('btn-avvia').disabled    = true;
  document.getElementById('fine-av').style.display = 'none';
  const bs = document.getElementById('btn-salva');
  bs.disabled   = false;
  bs.textContent= 'SALVA SESSIONE';
  bs.classList.add('lamp-verde');
  document.getElementById('fine-i').textContent = '';
  document.getElementById('finput').value       = '';
  go('s1');
}

function go(id) {
  document.querySelectorAll('.schermata').forEach(s => s.classList.remove('attiva'));
  document.getElementById(id).classList.add('attiva');
}

function setH(prog, sess) {
  ['h2p','h3p'].forEach(id => document.getElementById(id).textContent = prog);
  ['h2s','h3s'].forEach(id => document.getElementById(id).textContent = sess);
}
</script>
