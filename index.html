<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CL26051218_FIT</title>
<style>
  :root {
    --nero: #000000;
    --giallo: #ccff00;
    --verde: #00ff66;
    --rosso: #ff2222;
    --grigio: #333333;
    --grigio2: #1a1a1a;
    --testo: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--nero); color: var(--testo); font-family: 'Arial Black', Arial, sans-serif; min-height: 100vh; }

  .schermata { display: none; flex-direction: column; min-height: 100vh; padding: 7px; }
  .schermata.attiva { display: flex; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--grigio2); border: 1px solid #333; border-radius: 6px;
    padding: 5px 9px; margin-bottom: 7px;
  }
  .h-programma { color: var(--giallo); font-size: 0.68rem; font-weight: 900; flex: 1; }
  .h-sessione  { color: #fff; font-size: 0.68rem; font-weight: 900; flex: 1; text-align: center; }
  .h-versione  { color: #555; font-size: 0.58rem; font-weight: 700; flex: 1; text-align: right; }

  /* PULSANTI */
  .btn {
    display: block; width: 100%; padding: 13px 6px;
    background: var(--giallo); color: var(--nero);
    border: none; border-radius: 8px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.82rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 0.06em; cursor: pointer;
    transition: transform 0.07s ease, box-shadow 0.07s ease;
    margin-bottom: 7px; -webkit-user-select: none; user-select: none;
    box-shadow: 0 4px 0 #7a9900;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #7a9900; }
  .btn:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn.sm { padding: 11px 4px; font-size: 0.72rem; line-height: 1.2; }
  .btn.verde { background: var(--verde); box-shadow: 0 4px 0 #008833; }
  .btn.verde:active { box-shadow: 0 1px 0 #008833; }
  .btn.grigio { background: #2a2a2a; color: #777; box-shadow: 0 4px 0 #111; }
  .btn.grigio:active { box-shadow: 0 1px 0 #111; }
  .btn.rosso { background: var(--rosso); color: #fff; box-shadow: 0 4px 0 #880000; }

  /* S1 */
  .titolo-app { text-align: center; font-size: 1.5rem; font-weight: 900; color: var(--giallo); letter-spacing: 0.1em; margin: 16px 0 22px; }
  .sez-label { font-size: 0.65rem; font-weight: 900; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; margin-top: 12px; }
  .info-box { background: var(--grigio2); border: 1px solid #333; border-radius: 7px; padding: 11px; margin-bottom: 7px; font-size: 0.78rem; color: #888; line-height: 1.5; }
  .lista-sessioni { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .btn-sess {
    padding: 13px 12px; background: var(--grigio2); border: 2px solid #333; border-radius: 8px;
    color: #ccc; font-family: 'Arial Black', Arial, sans-serif; font-size: 0.85rem;
    font-weight: 900; text-transform: uppercase; cursor: pointer;
    transition: transform 0.07s; text-align: left; letter-spacing: 0.04em;
  }
  .btn-sess:active { transform: scale(0.97); }
  .btn-sess.sel { border-color: var(--giallo); color: var(--giallo); }

  /* S2 */
  #s2 { padding: 6px; }
  .riga-id { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 5px; }
  .id-badge {
    font-size: 1rem; font-weight: 900; padding: 5px 10px; border-radius: 6px;
    letter-spacing: 0.04em; min-width: 82px; text-align: center; border: 2px solid transparent;
  }
  .id-rosso { background: var(--rosso); color: #fff; }
  .id-verde { background: var(--verde); color: #000; }
  .id-giallo { background: var(--giallo); color: #000; animation: lamp 0.65s infinite; }
  @keyframes lamp { 0%,100%{opacity:1} 50%{opacity:0.15} }
  .pos-txt { font-size: 0.72rem; font-weight: 900; color: #666; white-space: nowrap; }
  .serie-txt { font-size: 1rem; font-weight: 900; color: var(--giallo); white-space: nowrap; }

  .desc-box { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 9px; margin-bottom: 6px; }
  .desc-b { font-size: 0.7rem; color: #bbb; line-height: 1.4; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .desc-d { font-size: 0.65rem; color: #666; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }

  .pgrid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
  .pgrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }
  .pitem { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 4px 5px; display: flex; flex-direction: column; align-items: center; }
  .plabel { font-size: 0.52rem; color: #666; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .pinput {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid #444;
    color: var(--giallo); font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.88rem; font-weight: 900; text-align: center; padding: 2px 0; outline: none;
  }
  .pinput:disabled { color: #333; border-bottom-color: #222; }
  .pesi-row { display: flex; align-items: center; gap: 3px; width: 100%; }
  .pesi-row .pinput:first-child { width: 28px; flex-shrink: 0; }
  .pesi-x { color: #444; font-size: 0.75rem; flex-shrink: 0; }
  .pesi-row .pinput:last-child { flex: 1; }

  /* Countdown */
  .cd-box {
    background: var(--grigio2); border: 2px solid #2a2a2a; border-radius: 8px;
    padding: 7px 10px; text-align: center; margin-bottom: 6px; min-height: 50px;
    display: flex; align-items: center; justify-content: center;
  }
  .cd-num { font-size: 2.1rem; font-weight: 900; color: var(--giallo); letter-spacing: 0.05em; }
  .cd-tipo { font-size: 0.58rem; color: #666; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; margin-left: 7px; }
  .cd-idle { color: #333; font-size: 0.7rem; font-weight: 900; }

  /* Nav pulsanti */
  .nav3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }
  .tim3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 5px; }

  /* Storico */
  .stor-box { background: var(--grigio2); border: 1px solid #2a2a2a; border-radius: 6px; padding: 5px 8px; flex: 1; overflow-y: auto; min-height: 75px; max-height: 155px; }
  .stor-tit { font-size: 0.58rem; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .stor-riga { font-size: 0.66rem; font-weight: 700; padding: 3px 0; border-bottom: 1px solid #222; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .stor-data { color: #444; font-size: 0.58rem; min-width: 52px; }
  .stor-s { color: var(--verde); }
  .stor-p { color: var(--giallo); }
  .stor-t { color: #ff9900; }
  .stor-empty { color: #333; font-size: 0.68rem; font-style: italic; }

  /* Flash */
  .flash { position: fixed; inset: 0; background: var(--giallo); opacity: 0; pointer-events: none; z-index: 9999; transition: opacity 0.08s; }
  .flash.on { opacity: 0.9; }

  /* S3 */
  #s3 { justify-content: center; align-items: center; text-align: center; gap: 18px; }
  .fine-t { font-size: 1.7rem; font-weight: 900; color: var(--verde); letter-spacing: 0.1em; line-height: 1.3; }
  .fine-s { font-size: 1.1rem; font-weight: 900; color: #666; letter-spacing: 0.15em; }
  .fine-i { font-size: 0.72rem; color: #444; line-height: 1.6; white-space: pre-line; }
</style>
</head>
<body>

<div class="flash" id="fl"></div>

<!-- S1: SELEZIONE -->
<div class="schermata attiva" id="s1">
  <div class="titolo-app">💪 FIT TRAINER</div>
  <div class="sez-label">Programma</div>
  <div class="info-box" id="info-prog">Nessun programma caricato</div>
  <button class="btn" onclick="document.getElementById('finput').click()">📂 CARICA PROGRAMMA JSON</button>
  <input type="file" id="finput" accept=".json" style="display:none" onchange="leggiJSON(event)">
  <div class="sez-label">Sessione</div>
  <div class="lista-sessioni" id="lista-sess"></div>
  <button class="btn verde" id="btn-avvia" disabled onclick="avviaSessione()">▶ AVVIA SESSIONE</button>
</div>

<!-- S2: SCHEDA -->
<div class="schermata" id="s2">
  <div class="header">
    <span class="h-programma" id="h2p">—</span>
    <span class="h-sessione"  id="h2s">—</span>
    <span class="h-versione">CL26051218_FIT</span>
  </div>

  <div class="riga-id">
    <div class="id-badge id-rosso" id="id-badge">—</div>
    <div class="pos-txt" id="pos-txt">0_0</div>
    <div class="serie-txt" id="serie-txt">SERIE: —</div>
  </div>

  <div class="desc-box">
    <div class="desc-b" id="desc-b">—</div>
    <div class="desc-d" id="desc-d">—</div>
  </div>

  <div class="pgrid3">
    <div class="pitem">
      <div class="plabel">SERIE</div>
      <input class="pinput" id="p-ser" type="number" min="0" max="10" oninput="clamp(this,0,10)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">RIP</div>
      <input class="pinput" id="p-rip" type="number" min="0" max="50" oninput="clamp(this,0,50)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">?×KG</div>
      <div class="pesi-row">
        <input class="pinput" id="p-pn" type="number" min="0" max="2" oninput="clamp(this,0,2)" onchange="saveP()">
        <span class="pesi-x">×</span>
        <input class="pinput" id="p-pk" type="number" min="0" max="999.9" step="0.1" oninput="clamp(this,0,999.9)" onchange="saveP()">
      </div>
    </div>
  </div>

  <div class="pgrid3">
    <div class="pitem">
      <div class="plabel">MIN</div>
      <input class="pinput" id="p-dm" type="number" min="0" max="999" oninput="clamp(this,0,999)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">SEC</div>
      <input class="pinput" id="p-ds" type="number" min="0" max="59" oninput="clamp(this,0,59)" onchange="saveP()">
    </div>
    <div class="pitem">
      <div class="plabel">RIP.SERIE</div>
      <input class="pinput" id="p-rs" type="number" min="0" max="99" oninput="clamp(this,0,99)" onchange="saveP()">
    </div>
  </div>

  <div class="pgrid2">
    <div class="pitem">
      <div class="plabel">RIP.FINALE</div>
      <input class="pinput" id="p-rf" type="number" min="0" max="99" oninput="clamp(this,0,99)" onchange="saveP()">
    </div>
    <div></div>
  </div>

  <div class="cd-box" id="cd-box">
    <span class="cd-idle">— PREMI UN TIMER —</span>
  </div>

  <div class="nav3">
    <button class="btn sm grigio" id="btn-prec" onclick="goPrec()">◀ PREC</button>
    <button class="btn sm verde"  id="btn-avs"  onclick="avviaScheda()">▶ AVVIO<br>SCHEDA</button>
    <button class="btn sm grigio" id="btn-succ" onclick="goSucc()">SUCC ▶</button>
  </div>

  <div class="tim3">
    <button class="btn sm" id="btn-td"  onclick="startTimer('d')"  disabled>⏱ AVVIO<br>DURATA</button>
    <button class="btn sm" id="btn-trs" onclick="startTimer('rs')" disabled>⏸ RIPOSO<br>SERIE</button>
    <button class="btn sm" id="btn-trf" onclick="startTimer('rf')" disabled>🏁 RIPOSO<br>FINALE</button>
  </div>

  <div class="stor-box" id="stor-box">
    <div class="stor-tit">STORICO PRESTAZIONI</div>
    <div id="stor-list"><div class="stor-empty">Nessuna prestazione registrata</div></div>
  </div>
</div>

<!-- S3: FINE -->
<div class="schermata" id="s3">
  <div class="header">
    <span class="h-programma" id="h3p">—</span>
    <span class="h-sessione"  id="h3s">—</span>
    <span class="h-versione">CL26051218_FIT</span>
  </div>
  <div class="fine-t" id="fine-t">SESSIONE<br>COMPLETATA</div>
  <div class="fine-s" id="fine-av" style="display:none">ARRIVEDERCI!</div>
  <div class="fine-i" id="fine-i"></div>
  <button class="btn verde" id="btn-salva" onclick="salvaSessione()">💾 SALVA SESSIONE</button>
  <button class="btn grigio" style="margin-top:6px" onclick="tornaInizio()">↩ TORNA ALL'INIZIO</button>
</div>

<script>
// ── STATO ──────────────────────────────────────────────
let J = null;           // JSON caricato
let SI = -1;            // sessione index
let CI = 0;             // scheda (card) index corrente
let PL = [];            // parametri locali per ogni scheda
let avviata = false;    // scheda corrente avviata
let serR = 0;           // serie rimanenti
let ultComp = -1;       // ultima scheda completata (indice)

// timer
let tInt = null, tSec = 0, tTipo = '';

// ── S1: CARICAMENTO ────────────────────────────────────
function leggiJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      J = JSON.parse(ev.target.result);
      document.getElementById('info-prog').textContent = '📋 ' + J.programma;
      mostraSessioni();
    } catch(err) { alert('JSON non valido: ' + err.message); }
  };
  r.readAsText(f);
}

function mostraSessioni() {
  const el = document.getElementById('lista-sess');
  el.innerHTML = '';
  SI = -1;
  document.getElementById('btn-avvia').disabled = true;
  J.sessioni.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'btn-sess';
    b.textContent = s.nome + '  (' + s.schede.length + ' schede)';
    b.onclick = () => {
      document.querySelectorAll('.btn-sess').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      SI = i;
      document.getElementById('btn-avvia').disabled = false;
    };
    el.appendChild(b);
  });
}

function avviaSessione() {
  if (SI < 0) return;
  const sess = J.sessioni[SI];
  PL = sess.schede.map(s => ({
    ser: s.serie, rip: s.ripetizioni,
    pn: s.pesi_num, pk: s.pesi_kg,
    dm: s.durata_min, ds: s.durata_sec,
    rs: s.riposo_serie_min, rf: s.riposo_finale_min
  }));
  CI = 0; avviata = false; ultComp = -1; serR = 0;
  setH(J.programma, sess.nome);
  go('s2');
  render();
}

// ── S2: RENDER SCHEDA ──────────────────────────────────
function render() {
  const sess = J.sessioni[SI];
  const nT   = sess.schede.length;
  const sc   = sess.schede[CI];
  const lib  = J.libreria[sc.id];
  const p    = PL[CI];

  // posizione
  document.getElementById('pos-txt').textContent = (CI+1) + '_' + nT;

  // badge ID colore
  const bd = document.getElementById('id-badge');
  bd.textContent = sc.id;
  bd.className = 'id-badge ' + (CI <= ultComp ? 'id-verde' : avviata ? 'id-giallo' : 'id-rosso');

  // descrizioni
  document.getElementById('desc-b').textContent = lib ? lib.desc_breve       : '—';
  document.getElementById('desc-d').textContent = lib ? lib.desc_dettagliata : '—';

  // parametri nei campi
  document.getElementById('p-ser').value = p.ser;
  document.getElementById('p-rip').value = p.rip;
  document.getElementById('p-pn').value  = p.pn;
  document.getElementById('p-pk').value  = p.pk;
  document.getElementById('p-dm').value  = p.dm;
  document.getElementById('p-ds').value  = p.ds;
  document.getElementById('p-rs').value  = p.rs;
  document.getElementById('p-rf').value  = p.rf;

  // lock parametri: schede già completate = sola lettura
  const lock = CI <= ultComp;
  ['p-ser','p-rip','p-pn','p-pk','p-dm','p-ds','p-rs','p-rf']
    .forEach(id => document.getElementById(id).disabled = lock);

  // contatore serie
  const stxt = document.getElementById('serie-txt');
  if (CI <= ultComp)      stxt.textContent = 'SERIE: ✓';
  else if (avviata)       stxt.textContent = 'SERIE: ' + serR;
  else                    stxt.textContent = 'SERIE: ' + p.ser;

  // pulsanti nav
  document.getElementById('btn-prec').disabled = (CI === 0);
  document.getElementById('btn-succ').disabled = false;

  // AVVIO SCHEDA: attivo solo se è la prossima da avviare e non ancora avviata
  const puoAvviare = !avviata && CI === ultComp + 1;
  document.getElementById('btn-avs').disabled = !puoAvviare;

  aggTimerBtn();
  renderStorico(sc.id);

  if (!tInt) cdIdle();
}

function aggTimerBtn() {
  const comp = CI <= ultComp;
  const p = PL[CI];
  const hasDur = (p.dm > 0 || p.ds > 0);
  document.getElementById('btn-td').disabled  = !avviata || comp || !hasDur;
  document.getElementById('btn-trs').disabled = !avviata || comp || serR <= 1;
  document.getElementById('btn-trf').disabled = !avviata || comp || serR !== 1;
}

function avviaScheda() {
  if (avviata) return;
  avviata = true;
  serR = parseInt(PL[CI].ser) || 0;
  document.getElementById('serie-txt').textContent = 'SERIE: ' + serR;
  document.getElementById('id-badge').className = 'id-badge id-giallo';
  document.getElementById('btn-avs').disabled = true;
  aggTimerBtn();
}

function goPrec() {
  stopTimer(); avviata = false;
  if (CI > 0) { CI--; render(); }
}

function goSucc() {
  stopTimer();
  const nT = J.sessioni[SI].schede.length;
  if (CI < nT - 1) { avviata = false; CI++; render(); }
  else { go('s3'); }
}

function saveP() {
  if (CI <= ultComp) return;
  const p = PL[CI];
  p.ser = parseFloat(document.getElementById('p-ser').value)||0;
  p.rip = parseFloat(document.getElementById('p-rip').value)||0;
  p.pn  = parseFloat(document.getElementById('p-pn').value) ||0;
  p.pk  = parseFloat(document.getElementById('p-pk').value) ||0;
  p.dm  = parseFloat(document.getElementById('p-dm').value) ||0;
  p.ds  = parseFloat(document.getElementById('p-ds').value) ||0;
  p.rs  = parseFloat(document.getElementById('p-rs').value) ||0;
  p.rf  = parseFloat(document.getElementById('p-rf').value) ||0;
  if (!avviata) { serR = p.ser; document.getElementById('serie-txt').textContent = 'SERIE: '+serR; }
  aggTimerBtn();
}

function clamp(el, mn, mx) {
  let v = parseFloat(el.value); if (isNaN(v)) return;
  if (v < mn) el.value = mn; if (v > mx) el.value = mx;
}

// ── TIMER ──────────────────────────────────────────────
function startTimer(tipo) {
  stopTimer();
  const p = PL[CI];
  let sec = 0;
  if (tipo === 'd')  sec = p.dm*60 + p.ds;
  if (tipo === 'rs') sec = p.rs*60;
  if (tipo === 'rf') sec = p.rf*60;
  tTipo = tipo;
  if (sec <= 0) { onEnd(tipo); return; }
  tSec = sec; cdShow(tSec, tipo);
  tInt = setInterval(() => {
    tSec--;
    if (tSec <= 0) { stopTimer(); alert3(); onEnd(tipo); }
    else cdShow(tSec, tipo);
  }, 1000);
}

function stopTimer() {
  if (tInt) { clearInterval(tInt); tInt = null; }
}

function onEnd(tipo) {
  cdIdle();
  if (tipo === 'rs' || tipo === 'rf') {
    if (serR > 0) serR--;
    document.getElementById('serie-txt').textContent = 'SERIE: ' + serR;
    if (tipo === 'rf' && serR === 0) completaScheda();
    aggTimerBtn();
  }
}

function completaScheda() {
  const sc = J.sessioni[SI].schede[CI];
  const p  = PL[CI];
  if (!J.storico[sc.id]) J.storico[sc.id] = [];
  const d = new Date();
  const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  J.storico[sc.id].unshift({ data:ds, ser:p.ser, rip:p.rip, pn:p.pn, pk:p.pk, dm:p.dm, ds:p.ds });
  if (J.storico[sc.id].length > 10) J.storico[sc.id].length = 10;
  localStorage.setItem('fit_j', JSON.stringify(J));
  ultComp = CI; avviata = false;
  document.getElementById('id-badge').className = 'id-badge id-verde';
  document.getElementById('btn-avs').disabled = true;
  renderStorico(sc.id);
}

function cdShow(sec, tipo) {
  const m = Math.floor(sec/60), s = sec%60;
  const lbl = tipo==='d'?'DURATA':tipo==='rs'?'RIPOSO SERIE':'RIPOSO FINALE';
  document.getElementById('cd-box').innerHTML =
    '<span class="cd-num">'+m+':'+String(s).padStart(2,'0')+'</span>'+
    '<span class="cd-tipo">'+lbl+'</span>';
}

function cdIdle() {
  document.getElementById('cd-box').innerHTML = '<span class="cd-idle">— PREMI UN TIMER —</span>';
}

function alert3() {
  // Flash
  const fl = document.getElementById('fl');
  [0,350,700].forEach(t => {
    setTimeout(()=>{ fl.classList.add('on'); setTimeout(()=>fl.classList.remove('on'),180); }, t);
  });
  // Beep
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.32,0.64].forEach(t => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=900;
      g.gain.setValueAtTime(0.9, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.22);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.25);
    });
  } catch(e){}
  // Vibra
  if(navigator.vibrate) navigator.vibrate([200,80,200,80,400]);
}

// ── STORICO ────────────────────────────────────────────
function renderStorico(id) {
  const righe = (J && J.storico && J.storico[id]) ? J.storico[id] : [];
  const el = document.getElementById('stor-list');
  if (!righe.length) { el.innerHTML = '<div class="stor-empty">Nessuna prestazione registrata</div>'; return; }
  el.innerHTML = righe.map(r => {
    let pt = [];
    if (r.ser>0||r.rip>0) pt.push('<span class="stor-s">'+r.ser+'x'+r.rip+'</span>');
    if (r.pn>0||r.pk>0)   pt.push('<span class="stor-p">'+r.pn+'x'+r.pk+'kg</span>');
    if (r.dm>0||r.ds>0)   pt.push('<span class="stor-t">'+r.dm+'m:'+String(r.ds).padStart(2,'0')+'s</span>');
    return '<div class="stor-riga"><span class="stor-data">'+r.data+'</span>'+pt.join(' ')+'</div>';
  }).join('');
}

// ── S3: SALVA ──────────────────────────────────────────
function salvaSessione() {
  const sess = J.sessioni[SI];
  sess.schede.forEach((s,i)=>{
    const p=PL[i];
    s.serie=p.ser; s.ripetizioni=p.rip; s.pesi_num=p.pn; s.pesi_kg=p.pk;
    s.durata_min=p.dm; s.durata_sec=p.ds; s.riposo_serie_min=p.rs; s.riposo_finale_min=p.rf;
  });
  localStorage.setItem('fit_j', JSON.stringify(J));
  const d=new Date();
  const ds=J.programma+'_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.json';
  const blob=new Blob([JSON.stringify(J,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=ds; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('btn-salva').disabled=true;
  document.getElementById('btn-salva').textContent='✓ SALVATO';
  document.getElementById('fine-av').style.display='block';
  document.getElementById('fine-i').textContent='File: '+ds;
}

function tornaInizio() {
  J=null; SI=-1; CI=0; PL=[]; avviata=false; ultComp=-1; serR=0;
  stopTimer();
  document.getElementById('info-prog').textContent='Nessun programma caricato';
  document.getElementById('lista-sess').innerHTML='';
  document.getElementById('btn-avvia').disabled=true;
  document.getElementById('fine-av').style.display='none';
  document.getElementById('btn-salva').disabled=false;
  document.getElementById('btn-salva').textContent='💾 SALVA SESSIONE';
  document.getElementById('fine-i').textContent='';
  document.getElementById('finput').value='';
  go('s1');
}

// ── UTILITÀ ────────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.schermata').forEach(s=>s.classList.remove('attiva'));
  document.getElementById(id).classList.add('attiva');
}
function setH(prog,sess) {
  ['h2p','h3p'].forEach(id=>document.getElementById(id).textContent=prog);
  ['h2s','h3s'].forEach(id=>document.getElementById(id).textContent=sess);
}
